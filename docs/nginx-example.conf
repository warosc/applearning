# Ejemplo de configuración Nginx como reverse proxy para Simulador de Examen
# Colocar en /etc/nginx/sites-available/ y enlazar a sites-enabled

# Redirigir HTTP a HTTPS (opcional, si usas SSL)
# server {
#     listen 80;
#     server_name examen.tudominio.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;  # Descomentar para HTTPS
    server_name examen.tudominio.com;

    # Certificados SSL (descomentar para HTTPS)
    # ssl_certificate /etc/letsencrypt/live/examen.tudominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/examen.tudominio.com/privkey.pem;

    # Frontend (Next.js)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API Backend
    location /api {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
