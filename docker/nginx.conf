# Docker's internal DNS resolver — re-resolves service names on each request
# so nginx never holds a stale IP after container rebuilds.
resolver 127.0.0.11 valid=10s ipv6=off;

# Gzip compression
gzip on;
gzip_proxied any;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
gzip_min_length 1024;
gzip_vary on;

server {
  listen 80;
  server_name _;

  # Security headers
  add_header X-Frame-Options SAMEORIGIN always;
  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # Hide Nginx version
  server_tokens off;

  # Default body size limit
  client_max_body_size 10m;

  # API proxy — FastAPI backend
  # Using a variable forces nginx to re-resolve "backend" via the DNS resolver above.
  location /api/ {
    set $backend http://backend:4000;
    proxy_pass $backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Next.js frontend
  location / {
    set $frontend http://frontend:3000;
    proxy_pass $frontend;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    proxy_cache_bypass $http_upgrade;
  }
}
