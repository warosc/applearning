name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ── 1. Backend tests ─────────────────────────────────────────────
  test-backend:
    name: Backend tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend-py/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r backend-py/requirements.txt
          pip install -r backend-py/requirements-test.txt

      - name: Run tests
        working-directory: backend-py
        run: python -m pytest tests/ -q

  # ── 2. Frontend type check ────────────────────────────────────────
  check-frontend:
    name: Frontend TypeScript check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Jest tests
        working-directory: frontend
        run: npx jest --passWithNoTests

  # ── 3. Deploy ────────────────────────────────────────────────────
  deploy:
    name: Deploy via SSH
    runs-on: ubuntu-latest
    needs: [test-backend, check-frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: 22
          script_stop: true
          script: |
            set -e
            echo "→ Pulling latest code..."
            cd /opt/simulador-exhcoba/applearning
            git pull origin main

            echo "→ Rebuilding and restarting containers..."
            cd docker
            docker compose -f docker-compose.prod.yml up --build -d --remove-orphans

            echo "→ Waiting for backend health..."
            sleep 15
            docker compose -f docker-compose.prod.yml ps

            echo "→ Cleaning unused images..."
            docker image prune -f

            echo "✓ Deploy completado"
